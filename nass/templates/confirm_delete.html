<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Delete</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding-top: 50px;
        }
        .confirmation-box {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="confirmation-box">
            <h2 class="mb-4">Confirm Task Deletion</h2>
            <p>Are you sure you want to delete the task <strong>"{{ task.title }}"</strong>?</p>
            <p class="text-muted">This action cannot be undone.</p>
            
            <div class="d-flex justify-content-between mt-4">
                <a href="{% url 'task_list' %}" class="btn btn-outline-secondary">Cancel</a>
                <form method="POST" action="{% url 'delete_task' task.pk %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Delete Task</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
