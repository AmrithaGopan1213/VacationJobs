<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Withdrawal Successful</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f8;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .container h2 {
            color: green;
            margin-bottom: 15px;
        }

        .container p {
            font-size: 16px;
            margin-bottom: 20px;
        }

        .container .url-box {
            font-size: 14px;
            color: #555;
            background: #f0f0f0;
            padding: 8px;
            border-radius: 5px;
            margin-top: 15px;
            word-wrap: break-word;
        }

        .btn {
            background-color: #007bff;
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>✅ Withdrawal Successful!</h2>
        <p>You will receive your money within 24 hours.</p>
        <a href="/withdrawal-details" class="btn">View Details</a>
        <div class="url-box" id="current-url"></div>
    </div>

    <script>
        // Show current URL
        document.getElementById("current-url").textContent = "Page URL: " + window.location.href;
    </script>
</body>
</html>
