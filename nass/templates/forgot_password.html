<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forgot Password</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      flex-direction: column;
      text-align: center;
      position: relative;
      padding: 20px; /* padding so content doesn't touch edges on small devices */
      box-sizing: border-box;
    }

    .close-button {
      position: absolute;
      top: 10px;
      right: 10px;
      background: red;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    .close-button:hover {
      background: darkred;
    }

    form {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 360px;
      text-align: center;
      box-sizing: border-box;
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
      font-size: 1.6rem;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
      font-size: 1rem;
      text-align: left;
    }

    input[type="email"] {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
      box-sizing: border-box;
      transition: border-color 0.3s ease;
    }

    input[type="email"]:focus {
      border-color: #007bff;
      outline: none;
    }

    button {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      font-size: 1.1rem;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #0056b3;
    }

    /* Custom Popup Message Styles */
    .custom-popup {
      position: fixed;
      top: 20px; /* Position at the top */
      left: 50%;
      transform: translateX(-50%);
      background-color: #4caf50; /* Green background for success */
      color: white;
      padding: 15px 30px;
      border-radius: 5px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      z-index: 1000;
      display: none; /* Hidden by default */
      animation: slideIn 0.5s ease-out;
      max-width: 90%;
      box-sizing: border-box;
      font-size: 1rem;
    }

    @keyframes slideIn {
      from {
        top: -50px;
        opacity: 0;
      }
      to {
        top: 20px;
        opacity: 1;
      }
    }

    .custom-popup.show {
      display: block; /* Show the popup */
    }

    /* Responsive tweaks */
    @media (max-width: 480px) {
      h2 {
        font-size: 1.4rem;
      }
      input[type="email"] {
        font-size: 0.95rem;
        padding: 10px;
      }
      button {
        font-size: 1rem;
        padding: 10px;
      }
      label {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <!-- Custom Popup Message -->
  <div id="custom-popup" class="custom-popup"></div>

  <h2>Forgot Password</h2>
  <form method="POST">
    {% csrf_token %}
    <label for="email">Enter your email:</label>
    <input type="email" id="email" name="email" required />
    <button type="submit">Send Reset Link</button>
  </form>

  {% if messages %}
    {% for message in messages %}
      <script>
        // Display the custom popup message
        const popup = document.getElementById('custom-popup');
        popup.textContent = '{{ message }}';
        popup.classList.add('show');

        // Hide the popup after 4.5 seconds
        setTimeout(() => {
          popup.classList.remove('show');
        }, 4500);
      </script>
    {% endfor %}
  {% endif %}
</body>
</html>
