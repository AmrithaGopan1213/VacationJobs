<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

  <style>
    body {
      background-color: #f8f9fa;
      font-family: Arial, sans-serif;
      padding-top: 30px;
    }

    h2 {
      text-align: center;
      font-size: 2rem;
      color: #007bff;
      margin-bottom: 30px;
    }

    .table-container {
      max-width: 100%;
      margin: auto;
      overflow-x: auto;
      padding: 0 15px;
    }

    .table th {
      background-color: #007bff;
      color: #ffffff;
      font-weight: bold;
      text-align: center;
    }

    .table td {
      text-align: center;
      background-color: #f9f9f9;
    }

    .btn-verify,
    .btn-unverify {
      padding: 6px 12px;
      font-size: 0.875rem;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      color: #fff;
    }

    .btn-verify {
      background-color: #28a745;
    }

    .btn-verify:hover {
      background-color: #218838;
    }

    .btn-unverify {
      background-color: #a72828;
    }

    .btn-unverify:hover {
      background-color: #883621;
    }

    .empty-row td {
      text-align: center;
      font-style: italic;
      color: #6c757d;
    }

    .alert {
      margin: 20px auto;
      max-width: 90%;
      background-color: #4caf50;
      color: white;
      padding: 10px;
      border-radius: 5px;
      text-align: center;
    }

    @media (max-width: 576px) {
      .btn-verify,
      .btn-unverify {
        display: block;
        width: 100%;
        margin-bottom: 5px;
      }

      td, th {
        font-size: 0.875rem;
        padding: 10px;
      }
    }

    .btn-primary {
        background-color: #007bff;
        color: white;
        padding: 8px 15px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    .btn-primary:hover {
        background-color: #0069d9;
    }

    .btn-danger {
        background-color: #dc3545;
        color: white;
        padding: 8px 15px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    .btn-danger:hover {
        background-color: #c82333;
    }

    .search-container {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
      padding: 0 15px;
    }

    .search-box {
      position: relative;
      width: 300px;
    }

    .search-box input {
      padding-right: 35px;
      border-radius: 20px;
    }

    .search-box i {
      position: absolute;
      right: 10px;
      top: 10px;
      color: #6c757d;
    }

    /* New styles for close button */
    .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 1.5rem;
      color: #6c757d;
      cursor: pointer;
      transition: color 0.3s;
    }

    .close-btn:hover {
      color: #dc3545;
    }

    .container {
      position: relative; /* Needed for absolute positioning of close button */
    }
  </style>

  <script>
    function verifyUser(userId) {
      fetch(`/verify-user/${userId}/`, {
        method: 'POST',
        headers: {
          'X-CSRFToken': '{{ csrf_token }}'
        }
      })
      .then(response => response.json())
      .then(data => {
        alert(data.message);
        location.reload();
      });
    }

    function unverifyUser(userId) {
      fetch(`/unverify-user/${userId}/`, {
        method: 'POST',
        headers: {
          'X-CSRFToken': '{{ csrf_token }}'
        }
      })
      .then(response => response.json())
      .then(data => {
        alert(data.message);
        location.reload();
      });
    }

    function loginAsUser(userId) {
        fetch(`/impersonate-user/${userId}/`, { 
            method: 'POST', 
            headers: { 
                'X-CSRFToken': '{{ csrf_token }}',
                'Content-Type': 'application/json'
            }
        })
        .then(response => {
            if (response.ok) {
                window.location.href = '/user/';  // Redirect to user dashboard
            } else {
                alert('Failed to login as user');
            }
        });
    }

    function deleteUser(userId) {
        if (confirm('Are you sure you want to delete this user? This action cannot be undone.')) {
            fetch(`/delete-user/${userId}/`, {
                method: 'POST',
                headers: {
                    'X-CSRFToken': '{{ csrf_token }}',
                    'Content-Type': 'application/json'
                }
            })
            .then(response => {
                if (response.ok) {
                    alert('User deleted successfully');
                    location.reload();
                } else {
                    alert('Failed to delete user');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('An error occurred while deleting the user');
            });
        }
    }

    function searchUsers() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const rows = document.querySelectorAll('tbody tr');
      
      rows.forEach(row => {
        const username = row.cells[0].textContent.toLowerCase();
        const email = row.cells[1].textContent.toLowerCase();
        
        if (username.includes(searchTerm) || email.includes(searchTerm)) {
          row.style.display = '';
        } else {
          row.style.display = 'none';
        }
      });
    }

    function closePage() {
      // Redirect to admin dashboard when close icon is clicked
      window.location.href = '/admin_dashboard';
    }
  </script>
</head>
<body>

  <div class="container">
    <!-- Close button that redirects to admin dashboard -->
    <span class="close-btn" onclick="closePage()" title="Return to Admin Dashboard">
      <i class="fas fa-times"></i>
    </span>

    <h2>Admin - User Management</h2>

    <div class="search-container">
      <div class="search-box">
        <input type="text" id="searchInput" class="form-control" placeholder="Search users..." onkeyup="searchUsers()">
        <i class="fas fa-search"></i>
      </div>
    </div>

    <div class="table-container table-responsive">
      <table class="table table-bordered">
        <thead>
          <tr>
            <th>Username</th>
            <th>Email</th>
            <th>Verified</th>
            <th>Action</th>
            <th>Login As User</th>
            <th>Delete</th>
          </tr>
        </thead>
        <tbody>
          {% for user in users %}
            <tr>
              <td>{{ user.user.username }}</td>
              <td>{{ user.email }}</td>
              <td>{{ user.is_verified }}</td>
              <td>
                <button class="btn-verify" onclick="verifyUser('{{ user.id }}')">Verify</button>
                <button class="btn-unverify" onclick="unverifyUser('{{ user.id }}')">Unverify</button>
              </td>
              <td>
                <button class="btn btn-primary" onclick="loginAsUser('{{ user.user.id }}')">Login</button>
              </td>
              <td>
                <button class="btn btn-danger" onclick="deleteUser('{{ user.user.id }}')">Delete</button>
              </td>
            </tr>
          {% empty %}
            <tr class="empty-row">
              <td colspan="6">No users found</td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>

    {% if message %}
      <div class="alert">{{ message }}</div>
    {% endif %}
  </div>

</body>
</html>
